# --- Configuración de riesgo ---
# Inversión total = margen comprometido por operación
risk.amount-usdt=40.0
# El SL debe quedar dentro del 50% de la distancia a liquidación (buffer de seguridad)
risk.liquidation-buffer=0.5
risk.max-leverage=50
# Take profit = 2x la distancia del SL
risk.risk-reward-ratio=2.0
# Margen de mantenimiento del exchange (0.005 = 0.5%, ajústalo según tu símbolo/tier)
risk.maintenance-margin=0.005
